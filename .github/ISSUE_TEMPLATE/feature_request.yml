name: Feature Request
description: Propose a new feature or enhancement for LearnBook
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: ["nixrajput"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check if this feature has already been requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're experiencing in the app.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include any UI/UX ideas or technical notes.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Reader (chapter view)
        - Course list / detail
        - Notes panel
        - Bookmarks
        - Progress tracking
        - Sidebar / TOC
        - Seeding / DB
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High — blocking or significantly impacts workflow
        - Medium — nice to have
        - Low — future consideration
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches worth noting.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to similar features, or anything else helpful.
